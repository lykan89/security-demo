sonar.projectKey=vulnerable-demo-app
sonar.projectName=Vulnerable Demo App
sonar.projectVersion=1.0.0

# Project source files
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,.git/**,.github/**

# Language and files
sonar.language=js
sonar.javascript.file.suffixes=.js,.jsx
sonar.tests=__tests__,tests
sonar.test.inclusions=**/__tests__/**,**/tests/**,**/*.test.js,**/*.spec.js

# Coverage - if using Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,node_modules/**

# Security Rules Configuration
sonar.security.hotspots.enable=true

# Rules to enable - focus on security vulnerabilities
sonar.javascript.security.rules=
sonar.security.rules.include=sql-injection,xss,path-traversal,command-injection,hardcoded-secrets,weak-crypto,xxe,insecure-deserialization

# Strictness
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=node_modules/**

# Quality Gates - Security focused
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Performance
sonar.pullrequest.lightweight=true
sonar.java.source=1.8

# Server connection (update with your SonarQube instance)
# sonar.host.url=http://localhost:9000
# sonar.login=${SONAR_TOKEN}
